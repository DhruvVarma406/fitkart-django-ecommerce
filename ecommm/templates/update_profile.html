{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>
Update Profile
</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>
Phone Number
</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ profile.phone }}">

</div>

<div class="mb-3">

<label>
Address
</label>

<textarea
name="address"
class="form-control">{{ profile.address }}</textarea>

</div>

<div class="mb-3">

<label>
City
</label>

<input
type="text"
name="city"
class="form-control"
value="{{ profile.city }}">

</div>

<div class="mb-3">

<label>
State
</label>

<input
type="text"
name="state"
class="form-control"
value="{{ profile.state }}">

</div>

<div class="mb-3">

<label>
Pincode
</label>

<input
type="text"
name="pincode"
class="form-control"
value="{{ profile.pincode }}">

</div>

<button
class="btn btn-success w-100">

Update Profile

</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
