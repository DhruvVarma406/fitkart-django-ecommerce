{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-success text-white text-center">

                <h2>Welcome Back</h2>

                <p class="mb-0">
                    Login to your FITKART account
                </p>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            placeholder="Enter Username"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            placeholder="Enter Password"
                            class="form-control">

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Login

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Don't have an account?

                    <a href="{% url 'register' %}">
                        Register Here
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
